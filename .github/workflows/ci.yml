name: CI
permissions:
  contents: read

# Triggers:
#   pull_request — runs on every PR opened, updated, or reopened (any branch)
#   push to main — runs after a merge to catch any issues on the main branch
#   workflow_dispatch — lets us trigger a manual run from the Actions tab.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    # GitHub spins up a fresh Ubuntu VM for each run. The VM is discarded after.
    runs-on: ubuntu-latest

    steps:
      # Clone the repo into the VM. Without this, the VM has no code.
      # @v4 pins to the latest 4.x release — not a specific patch, not @main.
      # Dependabot will open a PR when v5 is released.
      - uses: actions/checkout@v4

      # Install Python 3.12 on the VM. Pins the version so CI matches a known
      # baseline regardless of what GitHub's default happens to be.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Install runtime + dev dependencies from requirements.txt.
      # numpy is needed by cc_backtest.py; matplotlib by make_figures.py;
      # pytest/pytest-cov drive the tests; yfinance is unused by tests but
      # listed for the data downloader; ruff/pyright are used by the lint
      # and type-check steps below.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Lint with ruff — catches style issues, unused imports, and common bugs.
      # Exits non-zero on any violation, which fails the job.
      - name: Lint
        run: ruff check .

      # Static type checking with pyright. Checks all five Python source files.
      - name: Type check
        run: pyright cc_backtest.py download_prices.py make_figures.py make_notebook.py test_cc_backtest.py

      # The real-chain regression pins need the QQQ and MSFT option-chain
      # datasets, which are too large for git history. They ship as release
      # assets (tag data-2026-06), are cached between runs keyed on the
      # committed checksums, and are verified against those checksums after
      # download so a silently-replaced asset fails loudly. If the steps
      # below are ever removed, the pins skip instead of failing (see the
      # skipif markers in test_real_cc_backtest.py).
      - name: Restore chain-data cache
        id: chain-cache
        uses: actions/cache@v4
        with:
          path: |
            qqq_option_dailies.csv.gz
            msft_option_dailies.csv.gz
            msft_option_dailies_2008_2016.csv.gz
          key: chain-data-${{ hashFiles('data_checksums.sha256') }}

      - name: Fetch chain data from the data release
        if: steps.chain-cache.outputs.cache-hit != 'true'
        run: gh release download data-2026-06 --pattern '*_option_dailies*.csv.gz' --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify chain-data checksum
        run: sha256sum -c data_checksums.sha256

      # Unit tests with branch coverage: the engine suite against in-memory
      # price fixtures plus the real-chain regression pins against the
      # release-asset dataset fetched above (no other network access; the
      # unadjusted price CSV is committed).
      - name: Run tests
        run: pytest test_cc_backtest.py test_real_cc_backtest.py --cov=. --cov-branch -v

      # Smoke test: run the actual backtest against the committed MSFT CSV
      # to catch any breakage in the main entry point that the unit tests
      # might miss (e.g. CSV parsing, __main__ wiring, print formatting).
      - name: Backtest smoke test
        run: python cc_backtest.py

      # Figure regeneration check: ensure the figure-building pipeline still
      # works end-to-end (data parse + backtest + stats + matplotlib). We
      # don't byte-compare against the committed PNGs because matplotlib's
      # rendering can vary subtly across machine fonts and versions; instead
      # we assert the script runs cleanly and produces four non-trivial PNGs.
      # Anyone changing figure code or inputs should run `make_figures.py`
      # locally and commit the updated outputs.
      - name: Verify tutorial figures regenerate
        run: |
          python make_figures.py
          for f in docs/figures/01_equity_curves.png \
                   docs/figures/02_excess_histogram.png \
                   docs/figures/03_bias_variance.png \
                   docs/figures/04_t_stat_vs_years.png; do
            if [ ! -s "$f" ]; then
              echo "Missing or empty: $f"; exit 1
            fi
            size=$(stat -c%s "$f")
            if [ "$size" -lt 10000 ]; then
              echo "Suspiciously small (<10KB): $f at $size bytes"; exit 1
            fi
          done

      # Notebook drift check: the .ipynb is generated from the tutorial
      # markdown, so unlike the PNGs it's deterministic and we *can*
      # byte-compare. Regenerate and fail if it differs from the committed
      # copy — that means someone edited the tutorial or figure script
      # without running `python make_notebook.py` and committing the result.
      - name: Verify notebook is up to date
        run: |
          python make_notebook.py
          git diff --exit-code covered_call_backtest.ipynb \
            || (echo "covered_call_backtest.ipynb is stale — run 'python make_notebook.py' and commit." && exit 1)
