name: CI
permissions:
  contents: read

# Triggers:
#   pull_request — runs on every PR opened, updated, or reopened (any branch)
#   push to main — runs after a merge to catch any issues on the main branch
#   workflow_dispatch — lets us trigger a manual run from the Actions tab.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# The work is split into independent jobs that run on PARALLEL runners, so the
# wall-clock time is the slowest job, not the sum. The split is by what each
# group needs:
#   - lint        : ruff + pyright (no data, fast)
#   - engine      : proxy-engine suite + smoke + figures + notebook
#                   (needs only the committed price CSVs — no chain download)
#   - real-chain  : the real-chain regression pins (needs the option dailies)
#   - scouts      : the registered experiment + scouts + edge search
#                   (also need the option dailies)
# Each job is its own ~7GB runner, so the per-job memory footprint is one
# chain store at a time — well within budget (a single shared process holding
# every store at once does NOT fit, which is why there is no session cache).
# Coverage is now reported per test-job (it is informational here — not gated
# or uploaded); a combine step could restore a single number if ever needed.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      # Lint with ruff — catches style issues, unused imports, and common bugs.
      - name: Lint
        run: ruff check .
      # Static type checking with pyright across the core source files.
      - name: Type check
        run: pyright cc_backtest.py download_prices.py make_figures.py make_notebook.py test_cc_backtest.py

  engine:
    # Proxy-engine work: the in-memory engine suite plus the artifact checks.
    # None of this touches the option-chain datasets (it runs against the
    # committed price CSVs), so this job skips the chain download entirely and
    # runs off the real-chain critical path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      # The engine suite against in-memory price fixtures (pricing, the overlay
      # state machine, the statistics helper, walk-forward, Monte Carlo), plus
      # the option-dailies fetcher's pure chain-filter logic (put support).
      - name: Engine tests
        run: pytest test_cc_backtest.py test_download_option_dailies.py --cov=. --cov-branch -v
      # Smoke test: run the actual backtest against the committed MSFT CSV to
      # catch breakage in the main entry point the unit tests might miss
      # (CSV parsing, __main__ wiring, print formatting).
      - name: Backtest smoke test
        run: python cc_backtest.py
      # Figure regeneration check: ensure the figure-building pipeline still
      # works end-to-end. We don't byte-compare against the committed PNGs
      # because matplotlib rendering varies subtly across fonts/versions;
      # instead we assert the script runs and produces four non-trivial PNGs.
      - name: Verify tutorial figures regenerate
        run: |
          python make_figures.py
          for f in docs/figures/01_equity_curves.png \
                   docs/figures/02_excess_histogram.png \
                   docs/figures/03_bias_variance.png \
                   docs/figures/04_t_stat_vs_years.png; do
            if [ ! -s "$f" ]; then
              echo "Missing or empty: $f"; exit 1
            fi
            size=$(stat -c%s "$f")
            if [ "$size" -lt 10000 ]; then
              echo "Suspiciously small (<10KB): $f at $size bytes"; exit 1
            fi
          done
      # Notebook drift check: the .ipynb is generated from the tutorial
      # markdown, so it's deterministic and we *can* byte-compare. Regenerate
      # and fail if it differs — that means someone edited the tutorial or
      # figure script without running `python make_notebook.py` and committing.
      - name: Verify notebook is up to date
        run: |
          python make_notebook.py
          git diff --exit-code covered_call_backtest.ipynb \
            || (echo "covered_call_backtest.ipynb is stale — run 'python make_notebook.py' and commit." && exit 1)

  real-chain:
    # The real-chain regression pins need the QQQ/MSFT/SPY option-chain
    # datasets, which are too large for git history. They ship as release
    # assets (tag data-2026-06), are cached between runs keyed on the committed
    # checksums, and are verified after download so a silently-replaced asset
    # fails loudly. If these steps are ever removed, the pins skip instead of
    # failing (see the skipif markers in test_real_cc_backtest.py).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore chain-data cache
        id: chain-cache
        uses: actions/cache@v4
        with:
          path: |
            qqq_option_dailies.csv.gz
            qqq_option_dailies_2011_2016.csv.gz
            msft_option_dailies.csv.gz
            msft_option_dailies_2008_2016.csv.gz
            spy_option_dailies.csv.gz
            spy_option_dailies_puts.csv.gz
            iwm_option_dailies.csv.gz
            msft_option_dailies_puts.csv.gz
            qqq_option_dailies_puts.csv.gz
            gld_option_dailies.csv.gz
            tlt_option_dailies.csv.gz
            xle_option_dailies.csv.gz
            eem_option_dailies.csv.gz
          key: chain-data-${{ hashFiles('data_checksums.sha256') }}
      - name: Fetch chain data from the data release
        if: steps.chain-cache.outputs.cache-hit != 'true'
        run: gh release download data-2026-06 --pattern '*_option_dailies*.csv.gz' --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Verify chain-data checksum
        run: sha256sum -c data_checksums.sha256
      - name: Real-chain regression tests
        run: pytest test_real_cc_backtest.py --cov=. --cov-branch -v

  scouts:
    # The registered trend-gate experiment's analysis machinery
    # (docs/prereg_trend_gate.md — dataset-gated layer pins treatment-side
    # quantities only), the killed exploratory scouts (test_explorations.py,
    # docs/explorations.md), and the automated FDR-controlled edge-search
    # campaign (test_edge_search.py, docs/edge_search.md), and the delta-neutral
    # VRP scaffold (test_vol_premium.py, docs/vol_premium.md — synthetic mechanics
    # always run; the SPY structural check is dataset-gated), and the chain-hygiene
    # validator (test_validate_dailies.py — the classifier + boundary scan run
    # synthetically; the MSFT-backfill calibration to 2010-05-10 is dataset-gated).
    # Their dataset-gated pins need the same option dailies as the real-chain job;
    # their always-run layers run without the datasets.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore chain-data cache
        id: chain-cache
        uses: actions/cache@v4
        with:
          path: |
            qqq_option_dailies.csv.gz
            qqq_option_dailies_2011_2016.csv.gz
            msft_option_dailies.csv.gz
            msft_option_dailies_2008_2016.csv.gz
            spy_option_dailies.csv.gz
            spy_option_dailies_puts.csv.gz
            iwm_option_dailies.csv.gz
            msft_option_dailies_puts.csv.gz
            qqq_option_dailies_puts.csv.gz
            gld_option_dailies.csv.gz
            tlt_option_dailies.csv.gz
            xle_option_dailies.csv.gz
            eem_option_dailies.csv.gz
          key: chain-data-${{ hashFiles('data_checksums.sha256') }}
      - name: Fetch chain data from the data release
        if: steps.chain-cache.outputs.cache-hit != 'true'
        run: gh release download data-2026-06 --pattern '*_option_dailies*.csv.gz' --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Verify chain-data checksum
        run: sha256sum -c data_checksums.sha256
      - name: Experiment, scout & edge-search tests
        run: pytest test_trend_gate.py test_explorations.py test_edge_search.py test_vol_premium.py test_validate_dailies.py --cov=. --cov-branch -v
