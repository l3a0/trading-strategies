name: CI
permissions:
  contents: read

# Triggers:
#   pull_request — runs on every PR opened, updated, or reopened (any branch)
#   push to main — runs after a merge to catch any issues on the main branch
#   workflow_dispatch — lets us trigger a manual run from the Actions tab.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# The work is split into independent jobs that run on PARALLEL runners, so the
# wall-clock time is the slowest job, not the sum. The split is by what each
# group needs:
#   - lint        : ruff + pyright (no data, fast)
#   - engine      : proxy-engine suite + smoke + figures + notebook
#                   (needs only the committed price CSVs — no chain download)
#   - real-chain  : the real-chain regression pins (needs the option dailies)
#   - scouts      : the registered experiment + scouts + edge search
#                   (also need the option dailies)
# Each job is its own ~7GB runner, so the per-job memory footprint is one
# chain store at a time — well within budget (a single shared process holding
# every store at once does NOT fit, which is why there is no session cache).
# Coverage runs on the UNIT-test job (engine) only — informational (not gated/
# uploaded), and not worth its per-line tracing overhead on the slow data jobs
# (real-chain, scouts), which drop it. scouts is a runtime-balanced 3-bucket
# matrix (parallel runners) so its wall-clock is the slowest bucket, not the
# serial sum of all five files.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      # Lint with ruff — catches style issues, unused imports, and common bugs.
      - name: Lint
        run: ruff check .
      # Static type checking with pyright across the core source files.
      - name: Type check
        run: pyright engine/cc_backtest.py pipeline/download_prices.py engine/make_figures.py engine/make_notebook.py tests/test_cc_backtest.py

  engine:
    # Proxy-engine work: the in-memory engine suite plus the artifact checks.
    # None of this touches the option-chain datasets (it runs against the
    # committed price CSVs), so this job skips the chain download entirely and
    # runs off the real-chain critical path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      # The engine suite against in-memory price fixtures (pricing, the overlay
      # state machine, the statistics helper, walk-forward, Monte Carlo), plus
      # the option-dailies fetcher's pure chain-filter logic (put support), plus
      # the e-value FDR control (no data — calibrator / e-LOND / e-BH, oracle-pinned).
      - name: Engine tests
        run: pytest tests/test_cc_backtest.py tests/test_download_option_dailies.py tests/test_evalue_fdr.py tests/test_tharp_random_entry.py --cov=. --cov-branch -v
      # Smoke test: run the actual backtest against the committed MSFT CSV to
      # catch breakage in the main entry point the unit tests might miss
      # (CSV parsing, __main__ wiring, print formatting).
      - name: Backtest smoke test
        run: python -m engine.cc_backtest
      # Figure regeneration check: ensure the figure-building pipeline still
      # works end-to-end. We don't byte-compare against the committed PNGs
      # because matplotlib rendering varies subtly across fonts/versions;
      # instead we assert the script runs and produces four non-trivial PNGs.
      - name: Verify tutorial figures regenerate
        run: |
          python -m engine.make_figures
          for f in docs/figures/01_equity_curves.png \
                   docs/figures/02_excess_histogram.png \
                   docs/figures/03_bias_variance.png \
                   docs/figures/04_t_stat_vs_years.png; do
            if [ ! -s "$f" ]; then
              echo "Missing or empty: $f"; exit 1
            fi
            size=$(stat -c%s "$f")
            if [ "$size" -lt 10000 ]; then
              echo "Suspiciously small (<10KB): $f at $size bytes"; exit 1
            fi
          done
      # Notebook drift check: the .ipynb is generated from the tutorial
      # markdown, so it's deterministic and we *can* byte-compare. Regenerate
      # and fail if it differs — that means someone edited the tutorial or
      # figure script without running `python -m engine.make_notebook` and committing.
      - name: Verify notebook is up to date
        run: |
          python -m engine.make_notebook
          git diff --exit-code covered_call_backtest.ipynb \
            || (echo "covered_call_backtest.ipynb is stale — run 'python -m engine.make_notebook' and commit." && exit 1)

  real-chain:
    # The real-chain regression pins need the QQQ/MSFT/SPY option-chain
    # datasets, which are too large for git history. They ship as release
    # assets (tag data-2026-06), are cached between runs keyed on the committed
    # checksums, and are verified after download so a silently-replaced asset
    # fails loudly. If these steps are ever removed, the pins skip instead of
    # failing (see the skipif markers in tests/test_real_cc_backtest.py).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore chain-data cache
        id: chain-cache
        uses: actions/cache@v4
        with:
          path: |
            data/qqq_option_dailies.csv.gz
            data/qqq_option_dailies_2011_2016.csv.gz
            data/msft_option_dailies.csv.gz
            data/msft_option_dailies_2008_2016.csv.gz
            data/spy_option_dailies.csv.gz
            data/spy_option_dailies_puts.csv.gz
            data/iwm_option_dailies.csv.gz
            data/msft_option_dailies_puts.csv.gz
            data/qqq_option_dailies_puts.csv.gz
            data/gld_option_dailies.csv.gz
            data/tlt_option_dailies.csv.gz
            data/xle_option_dailies.csv.gz
            data/eem_option_dailies.csv.gz
            data/nvda_option_dailies.csv.gz
            data/msft_option_dailies_180dte.csv.gz
            data/spy_option_dailies_180dte.csv.gz
            data/qqq_option_dailies_180dte.csv.gz
            data/gld_option_dailies_180dte.csv.gz
            data/xle_option_dailies_180dte.csv.gz
            data/eem_option_dailies_180dte.csv.gz
            data/nvda_option_dailies_180dte.csv.gz
            data/tlt_option_dailies_180dte.csv.gz
          key: chain-data-${{ hashFiles('data/data_checksums.sha256') }}
      - name: Fetch chain data from the data release
        if: steps.chain-cache.outputs.cache-hit != 'true'
        run: gh release download data-2026-06 --pattern '*_option_dailies*.csv.gz' --clobber --dir data
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Verify chain-data checksum
        run: cd data && sha256sum -c data_checksums.sha256
      - name: Real-chain regression tests
        run: pytest tests/test_real_cc_backtest.py -v

  # The matrix job is named scout-buckets (NOT scouts), so its per-bucket checks are
  # "scout-buckets (vol-premium)" etc. The thin `scouts` gate job below re-exposes a
  # single required check named "scouts" (the `main` ruleset requires it) that is green
  # iff every bucket passed — giving the parallelism without renaming the required
  # check or editing the ruleset.
  scout-buckets:
    # The registered trend-gate experiment's analysis machinery
    # (docs/prereg_trend_gate.md — dataset-gated layer pins treatment-side
    # quantities only), the killed exploratory scouts (tests/test_explorations.py,
    # docs/explorations.md), and the automated FDR-controlled edge-search
    # campaign (tests/test_edge_search.py, docs/edge_search.md), and the delta-neutral
    # VRP scaffold (tests/test_vol_premium.py, docs/vol_premium.md — synthetic mechanics
    # always run; the real-chain equivalence + signature checks are dataset-gated), and the chain-hygiene
    # validator (tests/test_validate_dailies.py — the classifier + boundary scan run
    # synthetically; the MSFT-backfill calibration to 2010-05-10 is dataset-gated).
    # Their dataset-gated pins need the same option dailies as the real-chain job;
    # their always-run layers run without the datasets. Split into a runtime-
    # balanced 3-bucket matrix (parallel runners) so wall-clock is the slowest
    # bucket (~test_vol_premium) plus per-job overhead, not the serial sum of all
    # five files. Buckets balanced by measured runtime, NOT one-file-per-runner:
    # the files are ~5x unbalanced, so isolating the tiny ones onto their own
    # runners would pay the fixed pip-install + chain-cache-restore overhead for
    # no wall-clock gain (the floor is the biggest file either way).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `args` is per-bucket pytest flags. edge-search runs three full-campaign engine passes
        # (re-tag + the 56-cell structure batch + validate_dailies); `-n auto --dist loadscope`
        # spreads those CLASSES across the runner's cores so they run concurrently (loadscope keeps
        # each class — and its module-scoped campaign fixture — on ONE worker, so the campaign runs
        # once per class, not once per test). The tests are xdist-safe: ledger writes are tmp_path-
        # scoped and state changes go through monkeypatch (process-isolated per worker).
        include:
          - {bucket: vol-premium,   files: "tests/test_vol_premium.py", args: ""}
          - {bucket: edge-search,   files: "tests/test_edge_search.py tests/test_validate_dailies.py tests/test_read_gate_wire.py tests/test_generative_grammar.py tests/test_generative_engine.py tests/test_generative_proposer.py tests/test_generative_search.py tests/test_backend.py tests/test_factor_backend.py tests/test_factor_grammar.py tests/test_factor_engine.py tests/test_factor_mechanism.py tests/test_factor_search.py tests/test_factor_proposer.py tests/test_factor_panel.py", args: "-n auto --dist loadscope"}
          - {bucket: trend-explore, files: "tests/test_trend_gate.py tests/test_explorations.py tests/test_trade_ledger.py tests/test_walk_forward_structure.py", args: ""}
          - {bucket: cc-r,          files: "tests/test_cc_r_experiment.py", args: ""}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore chain-data cache
        id: chain-cache
        uses: actions/cache@v4
        with:
          path: |
            data/qqq_option_dailies.csv.gz
            data/qqq_option_dailies_2011_2016.csv.gz
            data/msft_option_dailies.csv.gz
            data/msft_option_dailies_2008_2016.csv.gz
            data/spy_option_dailies.csv.gz
            data/spy_option_dailies_puts.csv.gz
            data/iwm_option_dailies.csv.gz
            data/msft_option_dailies_puts.csv.gz
            data/qqq_option_dailies_puts.csv.gz
            data/gld_option_dailies.csv.gz
            data/tlt_option_dailies.csv.gz
            data/xle_option_dailies.csv.gz
            data/eem_option_dailies.csv.gz
            data/nvda_option_dailies.csv.gz
            data/msft_option_dailies_180dte.csv.gz
            data/spy_option_dailies_180dte.csv.gz
            data/qqq_option_dailies_180dte.csv.gz
            data/gld_option_dailies_180dte.csv.gz
            data/xle_option_dailies_180dte.csv.gz
            data/eem_option_dailies_180dte.csv.gz
            data/nvda_option_dailies_180dte.csv.gz
            data/tlt_option_dailies_180dte.csv.gz
          key: chain-data-${{ hashFiles('data/data_checksums.sha256') }}
      - name: Fetch chain data from the data release
        if: steps.chain-cache.outputs.cache-hit != 'true'
        run: gh release download data-2026-06 --pattern '*_option_dailies*.csv.gz' --clobber --dir data
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Verify chain-data checksum
        run: cd data && sha256sum -c data_checksums.sha256
      - name: Experiment, scout & edge-search tests (${{ matrix.bucket }})
        run: pytest ${{ matrix.files }} -v ${{ matrix.args }}

  # Required-check gate: the `main` ruleset requires a status check literally named
  # "scouts". This thin job re-exposes it — it runs ALWAYS (so it still reports when a
  # bucket fails) and is green iff every scout-buckets matrix leg succeeded. No
  # checkout/setup; it only inspects the matrix's aggregate result.
  scouts:
    needs: [scout-buckets]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All scout buckets passed
        run: |
          if [ "${{ needs.scout-buckets.result }}" != "success" ]; then
            echo "::error::a scout bucket did not pass (scout-buckets result: ${{ needs.scout-buckets.result }})"
            exit 1
          fi
          echo "all scout buckets passed"
