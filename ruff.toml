# Ruff configuration.
#
# The repo otherwise runs on Ruff defaults; the only override is excluding
# the generated notebook. `covered_call_backtest.ipynb` is a build artifact
# (like the PNGs in docs/figures/) — its real source is the tutorial
# markdown, regenerated by `engine/make_notebook.py` and drift-checked in CI. It
# faithfully mirrors the tutorial's *intentionally* illustrative snippets
# (the Abramowitz & Stegun polynomial that deliberately shadows
# `normal_cdf`; the `run_cc_overlay_day` pseudo-handler that is "illustrative,
# not a function in the codebase"). Linting that generated copy would only
# pressure us to distort teaching code, so it's excluded here. All
# hand-authored .py files across the packages are still linted by `ruff check .`.
extend-exclude = ["covered_call_backtest.ipynb"]
